name: YouTube Video Analysis

on:
  schedule:
    - cron: '0 * * * *'  # Runs once every hour at minute 0
  workflow_dispatch:       # Allow manual trigger

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: ${{ github.workflow }}
    permissions:
      contents: write # Crucial for saving the state file
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install FFmpeg
        run: |
          sudo apt update
          sudo apt install -y ffmpeg
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install Playwright browsers
        run: |
          playwright install chromium
      - name: Run monitor
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ASSEMBLYAI_API_KEY: ${{ secrets.ASSEMBLYAI_API_KEY }}
          CHANNELS_LIST: ${{ secrets.CHANNELS_LIST }}
          DISCORD_DEBUG: "true"
        run: python monitor.py
      - name: Commit and Push changes
        run: |
          git config --global user.name "Watchdog Bot"
          git config --global user.email "bot@github.com"
          git add analysis_stats.json
          git commit -m "Update analysis stats" || exit 0
          git pull --rebase
          git push
