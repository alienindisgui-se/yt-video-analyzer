name: YouTube Video Analysis

on:
  schedule:
    - cron: '0 * * * *'  # Runs once every hour
  workflow_dispatch:       # Allow manual trigger

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: ${{ github.workflow }}
    permissions:
      contents: write # Crucial for saving the state file back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install System Dependencies
        run: |
          sudo apt update
          # xvfb is required for the WPC plugin's headless browser to function
          sudo apt install -y ffmpeg xvfb libexif12

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Install the specific bypass tools
          pip install yt-dlp-getpot-wpc nodriver yt-dlp

      - name: Install Playwright browsers
        run: |
          # Keep this if your script uses Playwright elsewhere
          playwright install chromium

      - name: Run monitor
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ASSEMBLYAI_API_KEY: ${{ secrets.ASSEMBLYAI_API_KEY }}
          CHANNELS_LIST: ${{ secrets.CHANNELS_LIST }}
          DISCORD_DEBUG: "true"
        # We wrap the execution in xvfb-run to provide a virtual display for nodriver
        run: xvfb-run python monitor.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add queue_state.json
          # Only commit if there are changes to avoid workflow errors
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update video queue state [skip ci]" && git push)